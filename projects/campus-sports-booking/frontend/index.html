<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园运动场地预约</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .container { max-width: 480px; margin: 60px auto; padding: 20px; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #333; margin-bottom: 24px; }
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 16px; }
    button { width: 100%; padding: 14px; background: #1976d2; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1565c0; }
    .link { text-align: center; margin-top: 16px; }
    .link a { color: #1976d2; text-decoration: none; }
    .msg { text-align: center; margin-top: 12px; color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🏀 场地预约</h1>
      <input type="text" id="phone" placeholder="手机号" maxlength="11">
      <input type="text" id="code" placeholder="验证码（任意6位数字）" maxlength="6">
      <button onclick="login()">登录</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>
  <script>
    const API = 'http://localhost:3000/api';
    async function login() {
      const phone = document.getElementById('phone').value.trim();
      const code = document.getElementById('code').value.trim();
      if (!phone || code.length !== 6) {
        document.getElementById('msg').textContent = '请输入手机号和6位验证码';
        return;
      }
      const res = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, code })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        location.href = 'venues.html';
      } else {
        document.getElementById('msg').textContent = data.error || '登录失败';
      }
    }
  </script>
</body>
</html>
